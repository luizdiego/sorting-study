<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Quicksort (1 a 10)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
            margin-top: 50px;
        }

        #container-barras {
            display: flex;
            align-items: flex-end;
            height: 300px;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .barra {
            width: 40px;
            background-color: #3498db;
            text-align: center;
            color: white;
            font-weight: bold;
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease, background-color 0.3s ease; 
        }

        .pivo { background-color: #f1c40f !important; }
        .comparando { background-color: #e74c3c !important; }
        .ordenado { background-color: #2ecc71 !important; }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h2>Visualização do Quicksort (Valores de 1 a 10)</h2>
    <div id="container-barras"></div>
    
    <div>
        <button id="btn-gerar" onclick="gerarBarras()">Gerar Nova Lista</button>
        <button id="btn-ordenar" onclick="iniciarOrdenacao()">Ordenar (Quicksort)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
